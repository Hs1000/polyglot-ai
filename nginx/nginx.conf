events {
    worker_connections 1024;
}

http {
    upstream backend {
        server backend:8000;
    }

    # --- HTTP-only (initial setup / before SSL) ---
    # Comment this block out after running certbot and enabling the HTTPS block below.
    server {
        listen 80;
        server_name _;

        # Allow large uploads (match MAX_UPLOAD_SIZE_MB)
        client_max_body_size 25M;

        location / {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # AI inference can take up to ~60 s on cold start
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }
    }

    # --- HTTPS (enable after running certbot) ---
    # 1. Replace YOUR_DOMAIN with your actual domain.
    # 2. Run:  certbot --nginx -d YOUR_DOMAIN
    # 3. Comment out the HTTP block above and uncomment this block.
