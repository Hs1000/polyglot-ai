name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Push to HuggingFace Spaces
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space https://dfbd1234:$HF_TOKEN@huggingface.co/spaces/dfbd1234/Polyglot-ai
          git push space main --force
